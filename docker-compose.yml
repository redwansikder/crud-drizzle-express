services:
  db:
    image: postgres:16-alpine
    container_name: local_pgdb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appdb
    volumes:
      - local_pgdbdata:/var/lib/postgresql/data
    networks:
      - pgnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: local_pgadmin
    ports:
      - "8888:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: user@localhost.com
      PGADMIN_DEFAULT_PASSWORD: password
    volumes:
      - local_pgadmindata:/var/lib/pgadmin
    networks:
      - pgnet
    depends_on:
      db:
        condition: service_healthy

volumes:
  local_pgdbdata:
  local_pgadmindata:

networks:
  pgnet:
    driver: bridge
